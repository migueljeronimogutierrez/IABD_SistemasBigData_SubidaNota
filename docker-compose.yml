services:

  postgres:
    image: postgres:15
    container_name: sbg_postgres
    restart: unless-stopped

    environment:
      POSTGRES_DB: musicdb
      POSTGRES_USER: sbguser
      POSTGRES_PASSWORD: sbgpass123
      POSTGRES_HOST_AUTH_METHOD: trust

    ports:
      - "5455:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    networks:
      - sbg_network

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sbguser -d musicdb"]
      interval: 10s
      timeout: 5s
      retries: 5

  metabase:
    image: metabase/metabase:v0.49.6
    container_name: sbg_metabase
    restart: unless-stopped

    ports:
      - "3000:3000"

    environment:
      MB_DB_TYPE: h2

    depends_on:
      postgres:
        condition: service_healthy

    networks:
      - sbg_network

networks:
  sbg_network:
    driver: bridge
    name: sbg_network

volumes:
  postgres_data:
    name: sbg_postgres_data